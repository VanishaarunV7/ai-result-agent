<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduAgent — Student Result Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --card:      #21253a;
      --border:    #2e3250;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --text:      #e8eaf6;
      --muted:     #7b82a8;
      --bot-bg:    #1e2235;
      --user-bg:   #2d2060;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-info h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--text);
    }
    .header-info p { font-size: 12px; color: var(--muted); }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--green);
    }
    .status-dot::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── Student Selector ── */
    .student-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .student-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .student-bar select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .student-bar select:focus { border-color: var(--accent); }

    .quick-btns {
      display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto;
    }
    .quick-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(108,99,255,0.1);
    }

    /* ── Chat Area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .msg { display: flex; gap: 10px; max-width: 75%; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .bot .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .user .avatar { background: var(--user-bg); border: 1px solid var(--accent); }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(108,99,255,0.4);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* ── Result Cards inside bubble ── */
    .result-section { margin-top: 12px; }
    .result-section h4 {
      font-size: 11px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .topic-card {
      display: flex; align-items: center;
      gap: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 6px;
    }
    .topic-name { font-size: 13px; flex: 1; }
    .topic-bar-wrap {
      width: 80px; height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .topic-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.6s ease;
    }
    .topic-pct { font-size: 12px; font-weight: 600; width: 36px; text-align: right; }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      white-space: nowrap;
    }
    .Critical { color: var(--red);    background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); }
    .Weak     { color: var(--yellow); background: rgba(251,191,36,0.12);  border: 1px solid rgba(251,191,36,0.3); }
    .Average  { color: #60a5fa;       background: rgba(96,165,250,0.12);  border: 1px solid rgba(96,165,250,0.3); }
    .Good     { color: var(--green);  background: rgba(52,211,153,0.12);  border: 1px solid rgba(52,211,153,0.3); }

    .bar-Critical { background: var(--red); }
    .bar-Weak     { background: var(--yellow); }
    .bar-Average  { background: #60a5fa; }
    .bar-Good     { background: var(--green); }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 4px; padding: 4px 0; }
    .typing span {
      width: 6px; height: 6px;
      background: var(--muted); border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── Input Area ── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; gap: 10px;
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 48px;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: white;
      width: 48px; height: 48px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #sendBtn:hover { opacity: 0.9; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🎓</div>
  <div class="header-info">
    <h1>EduAgent</h1>
    <p>AI Result Explanation Assistant</p>
  </div>
  <div class="status-dot">Live</div>
</header>

<!-- Student Selector -->
<div class="student-bar">
  <label>Student:</label>
  <select id="studentSelect">
    <option value="stu_001">Arun Kumar (ACD001)</option>
    <option value="stu_002">Priya Sharma (ACD002)</option>
    <option value="stu_003">Rahul Mehta (ACD003)</option>
    <option value="stu_004">Sneha Iyer (ACD004)</option>
    <option value="stu_005">Karthik Raj (ACD005)</option>
    <option value="stu_006">Divya Nair (ACD006)</option>
    <option value="stu_007">Vikram Singh (ACD007)</option>
    <option value="stu_008">Ananya Pillai (ACD008)</option>
    <option value="stu_009">Arjun Das (ACD009)</option>
    <option value="stu_010">Meera Krishnan (ACD010)</option>
  </select>

  <div class="quick-btns">
    <button class="quick-btn" onclick="quickAsk('Which topic should I improve?')">📚 Weak topics</button>
    <button class="quick-btn" onclick="quickAsk('How was my last exam?')">📝 Last exam</button>
    <button class="quick-btn" onclick="quickAsk('Am I improving?')">📈 Progress</button>
    <button class="quick-btn" onclick="quickAsk('Give me a study plan')">🗓️ Study plan</button>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="msg bot">
    <div class="avatar">🤖</div>
    <div class="bubble">
      👋 Hi! I'm your <strong>EduAgent</strong>.<br/>
      Select a student above and ask me anything about their exam performance!<br/><br/>
      Try: <em>"Which topic should I improve?"</em> or use the quick buttons above.
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <input id="msgInput" type="text" placeholder="Ask about your exam performance..." />
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
  const API_BASE = 'http://localhost:5000/api/result-agent';

  const chat = document.getElementById('chat');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  function quickAsk(q) {
    input.value = q;
    sendMessage();
  }

  function getStudentId() {
    return document.getElementById('studentSelect').value;
  }

  function appendMsg(role, content) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const isBot = role === 'bot';
    div.innerHTML = `
      <div class="avatar">${isBot ? '🤖' : '🧑'}</div>
      <div class="bubble">${content}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function levelColor(level) {
    return level;
  }

  function renderTopics(items, label) {
    if (!items || items.length === 0) return '';
    let html = `<div class="result-section"><h4>${label}</h4>`;
    items.forEach(item => {
      const name  = item.topic || item.outcome;
      const pct   = item.percentage;
      const level = item.level;
      html += `
        <div class="topic-card">
          <span class="topic-name">${name}</span>
          <div class="topic-bar-wrap">
            <div class="topic-bar bar-${level}" style="width:${pct}%"></div>
          </div>
          <span class="topic-pct" style="color:var(--${level === 'Critical' ? 'red' : level === 'Weak' ? 'yellow' : level === 'Good' ? 'green' : 'text'})">${pct}%</span>
          <span class="badge ${level}">${level}</span>
        </div>`;
    });
    html += '</div>';
    return html;
  }

  async function sendMessage() {
    const q = input.value.trim();
    if (!q) return;

    const studentId = getStudentId();
    input.value = '';
    sendBtn.disabled = true;

    appendMsg('user', q);
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId, question: q })
      });
      const data = await res.json();

      removeTyping();

      // Build response HTML
      let html = `<div>${data.answer}</div>`;

      // Fetch full topic data for visual cards
      try {
        const summaryRes = await fetch(`${API_BASE}/overall-summary?studentId=${studentId}`);
        const summary = await summaryRes.json();

        const sorted = [...summary.topicResults].sort((a, b) => a.percentage - b.percentage);
        html += renderTopics(sorted, '📊 Topic-wise Performance');

        const sortedOC = [...summary.outcomeResults].sort((a, b) => a.percentage - b.percentage);
        html += renderTopics(sortedOC, '🎯 Outcome-wise Performance');
      } catch (e) { /* summary optional */ }

      appendMsg('bot', html);

    } catch (err) {
      removeTyping();
      appendMsg('bot', `⚠️ Could not connect to server. Make sure <strong>node app.js</strong> is running on port 5000.`);
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
